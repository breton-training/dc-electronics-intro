<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 1: The Golden Rule</title>
    <style>
        body {
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }
        .lesson-image {
            width: 100%;
            border-radius: 10px;
            border: 3px solid #333;
            margin: 20px 0;
        }
        .concept-box {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .box {
            padding: 15px;
            border-radius: 10px;
            color: white;
            width: 30%;
            font-weight: bold;
        }
        .volt { background-color: #FF8C00; } /* Orange */
        .ohm { background-color: #8A2BE2; }  /* Purple */
        .amp { background-color: #00BFFF; }  /* Blue */
    </style>
</head>
<body>

    <div class="container">
        <h1>⚡ Lesson 1: The Golden Rule of Electricity</h1>
        <h2>A = V / R</h2>
        
        <img src="ohms_law_1.jpg" alt="Volt pushing Ohm squeezing Amp flowing" class="lesson-image">

        <div class="concept-box">
            <div class="box volt">VOLT<br>The Engine (Push)</div>
            <div class="box ohm">OHM<br>The Squeeze (Restriction)</div>
            <div class="box amp">AMP<br>The Result (Flow)</div>
        </div>

        <p style="font-size: 1.2em; margin-top: 30px;">
            <strong>Remember:</strong> You can add power (Volts), you can add restrictors (Ohms), but you can't add Amps. They are just the result of the push meeting the squeeze!
        </p>
    </div>

</body>
</html>
