<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#00BFFF" stroke-width="3"/>
  
  <!-- Inner circle (divided into 3 sections) -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#666" stroke-width="2"/>
  
  <!-- Horizontal dividing line -->
  <line x1="30" y1="100" x2="170" y2="100" stroke="#666" stroke-width="2"/>
  
  <!-- Vertical dividing line (right section) -->
  <line x1="100" y1="100" x2="170" y2="30" stroke="#666" stroke-width="2"/>
  <line x1="100" y1="100" x2="170" y2="170" stroke="#666" stroke-width="2"/>
  
  <!-- Top section: V (Voltage) -->
  <text x="100" y="50" font-size="32" font-weight="bold" fill="#FF8C00" text-anchor="middle">V</text>
  
  <!-- Bottom left section: R (Resistance) -->
  <text x="55" y="125" font-size="28" font-weight="bold" fill="#8A2BE2" text-anchor="middle">R</text>
  
  <!-- Bottom right section: I (Current) -->
  <text x="145" y="125" font-size="28" font-weight="bold" fill="#00BFFF" text-anchor="middle">I</text>
  
  <!-- Center: Legend/formula hints -->
  <text x="100" y="160" font-size="10" fill="#e0e0e0" text-anchor="middle">Ohm's Law</text>
  <text x="100" y="175" font-size="10" fill="#aaa" text-anchor="middle">V = I × R</text>
</svg>