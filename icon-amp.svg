<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#00BFFF" stroke="#1E90FF" stroke-width="2"/>
  
  <!-- A letter -->
  <text x="50" y="65" font-size="48" font-weight="bold" fill="white" text-anchor="middle">A</text>
  
  <!-- Flow arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="white" />
    </marker>
  </defs>
  <line x1="20" y1="30" x2="40" y2="30" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="60" y1="30" x2="80" y2="30" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Label -->
  <text x="50" y="95" font-size="14" font-weight="bold" fill="#00BFFF" text-anchor="middle">AMP</text>
</svg>